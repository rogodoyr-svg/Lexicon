spring.application.name=auth
server.port=7778

spring.datasource.url=jdbc:postgresql://localhost:5435/authdb
spring.datasource.username=authuser
spring.datasource.password=authpass
spring.datasource.driver-class-name=org.postgresql.Driver

# Forzar a Flyway a usar estas mismas credenciales
spring.flyway.url=jdbc:postgresql://localhost:5435/authdb
spring.flyway.user=authuser
spring.flyway.password=authpass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

security.jwt.secret=$&miSercreto.SuperSeguro!1988
security.jwt.expiration-hours=24

# Decirle a Flyway que ignore si los archivos locales cambiaron respecto a la BD
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=false