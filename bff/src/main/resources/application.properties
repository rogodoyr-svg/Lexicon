#configuration for BFF (Backend for Frontend) service
spring.application.name=bff
server.port=8080


# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD (JWT)
# ===================================================================
# Esta clave debe ser exactamente la misma que usa tu microservicio 'auth'
# Debe tener al menos 256 bits (32 caracteres) codificada en texto plano o Base64
application.security.jwt.secret-key=TuClaveSecretaSuperSeguraParaElSistemaLexicon2026!
jwt.secret=TuClaveSecretaSuperSeguraParaElSistemaLexicon2026!
# Tiempo de expiración por defecto (1 día en milisegundos)
application.security.jwt.expiration=86400000
auth.base.url=http://localhost:7778
auth.service.base-url=http://localhost:7778

# URLs DE LOS MICROSERVICIOS INTERNOS
# ===================================================================
# Estas propiedades definen los destinos hacia donde el BFF redirigirá o 
# consumirá la información (puedes usarlas en tus componentes @Value o clientes HTTP)
services.auth.url=http://localhost:7778
services.book.url=http://localhost:3333
services.loan.url=http://localhost:3334

# ===================================================================
# CONFIGURACIÓN DE LOGS (Para depurar el enrutamiento en consola)
# ===================================================================
logging.level.org.springframework.web=INFO
logging.level.com.ms.bff=DEBUG

# ===================================================================
# CONFIGURACIÓN OPCIONAL DE CORS (en caso de que el Frontend web corra en otro puerto)
# ===================================================================
# spring.mvc.cors.allowed-origins=http://localhost:4200,http://localhost:3000
# spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
