spring.application.name=libro-service

server.port=3333

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/libro_db}
spring.datasource.username=${DB_USERNAME:libro_user}
spring.datasource.password=${DB_PASSWORD:libro_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.lexicon.libro=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
