spring.application.name=prestamo-service

server.port=3334

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/prestamo_db}
spring.datasource.username=${DB_USERNAME:prestamo_user}
spring.datasource.password=${DB_PASSWORD:prestamo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.lexicon.prestamo=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Libro-Service URL
apiLibro.url=http://localhost:3333/api

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}
