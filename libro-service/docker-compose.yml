services:
  postgresLibro:
    image: postgres:16-alpine
    container_name: lexicon-libro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: libro_db
      POSTGRES_USER: libro_user
      POSTGRES_PASSWORD: libro_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_libro_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libro_user -d libro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_libro_data:
  
